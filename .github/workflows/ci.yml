name: CI

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Banned-constructs check (m0-kernel-spec §3.7)
        run: ./scripts/check-banned-constructs.sh

      - name: Read-isolation check (T2.6 — grievance read by nothing but UI/chronicle)
        run: ./scripts/check-read-isolation.sh

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Sim.slnx

      - name: Build
        run: dotnet build Sim.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test Sim.slnx --no-build --configuration Release

      - name: Read-only view mutation must not compile (T0.2 acceptance)
        run: ./scripts/check-readonly-proof.sh

  determinism:
    name: determinism
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Sim.slnx

      - name: Build
        run: dotnet build Sim.slnx --no-restore --configuration Release

      - name: Determinism harness (T0.8 permanent regression gate)
        run: |
          # Default step shell is 'bash -e': capture the pipeline status with
          # '|| status=$?' so the summary below is published on FAILURE too.
          set -o pipefail
          status=0
          start=$(date +%s)
          dotnet test Sim.slnx --no-build --configuration Release \
            --filter "suite=determinism" 2>&1 | tee determinism.log || status=$?
          end=$(date +%s)
          {
            echo "### Determinism harness (T0.8)"
            echo "Runtime: $((end-start))s (budget: ~300s ceiling — T2.11 sized the founded legs to 300 turns across the era gate; measured ~65s unloaded, founding+stepping dominate)"
            tail -n 3 determinism.log
          } >> "$GITHUB_STEP_SUMMARY"
          exit $status

  determinism-xproc:
    name: determinism-xproc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build CLI
        run: dotnet build Sim.Cli/Sim.Cli.csproj --configuration Release

      - name: Cross-process determinism (T0.9)
        run: |
          # Separate PROCESSES surface environment/culture/JIT divergence that
          # the in-process T0.8 twins structurally share.
          CLI="dotnet Sim.Cli/bin/Release/net10.0/Sim.Cli.dll"

          $CLI run --seed 42 --turns 400 --hash-log run-a.log
          $CLI run --seed 42 --turns 400 --hash-log run-b.log
          if ! diff run-a.log run-b.log > xproc.diff; then
            echo "CROSS-PROCESS DIVERGENCE — first divergent turn:"
            head -n 5 xproc.diff
            exit 1
          fi
          echo "orderless: two processes byte-identical over 400 turns"

          python3 scripts/gen-sample-orders.py sample-orders.bin 400
          $CLI run --seed 42 --turns 400 --orders sample-orders.bin --hash-log ordered.log
          $CLI replay --seed 42 --turns 400 --orders sample-orders.bin --hash-log replayed.log
          if ! diff ordered.log replayed.log > replay.diff; then
            echo "REPLAY DIVERGENCE — first divergent turn:"
            head -n 5 replay.diff
            exit 1
          fi
          echo "replay: byte-identical to the ordered run over 400 turns"

          # T1.9: the same discipline on the FOUNDED production world
          # (1024^2, N = 12). T2.11: 300 turns - the founded-harness horizon,
          # which since T2.11 CROSSES the era-pacing gate at turn 250 (dt
          # 10 -> 5), so cross-process determinism covers the dt transition;
          # each process is ~3s founding + ~1s stepping, the four runs below
          # add well under a minute to the job.
          # 300-turn horizon => orders at turns 0..280: the 260/280 orders
          # land AFTER the era gate, so ordered delivery in the Bronze dt=5
          # regime is exercised cross-process too (adversarial pass finding).
          python3 scripts/gen-sample-orders.py founded-orders.bin 300 --labor
          $CLI run --founded --seed 42 --turns 300 --hash-log f-run-a.log
          $CLI run --founded --seed 42 --turns 300 --hash-log f-run-b.log
          if ! diff f-run-a.log f-run-b.log > f-xproc.diff; then
            echo "FOUNDED CROSS-PROCESS DIVERGENCE — first divergent turn:"
            head -n 5 f-xproc.diff
            exit 1
          fi
          echo "founded orderless: two processes byte-identical over 300 turns"

          # Absolute pin (T1.9 adversarial hardening): the built binary's
          # founded run must land on the SAME golden the in-test constant pins
          # (SnapshotTests.FoundedGolden). A founding/pipeline bypass inside
          # the CLI that self-diffs cleanly still fails here. Update this hash
          # together with the test constant, deliberately.
          FOUNDED_GOLDEN=a5959cdc117ed5cb66f7ee6128d0ff81e66a04feb806e24f0558cadfdc65f2bf
          if [ "$(tail -n 1 f-run-a.log)" != "$FOUNDED_GOLDEN" ]; then
            echo "FOUNDED RUN DIVERGED FROM PINNED GOLDEN:"
            echo "  expected $FOUNDED_GOLDEN"
            echo "  actual   $(tail -n 1 f-run-a.log)"
            exit 1
          fi
          echo "founded run matches the pinned golden"

          $CLI run --founded --seed 42 --turns 300 --orders founded-orders.bin --hash-log f-ordered.log
          $CLI replay --founded --seed 42 --turns 300 --orders founded-orders.bin --hash-log f-replayed.log
          if ! diff f-ordered.log f-replayed.log > f-replay.diff; then
            echo "FOUNDED REPLAY DIVERGENCE — first divergent turn:"
            head -n 5 f-replay.diff
            exit 1
          fi
          echo "founded replay: byte-identical to the ordered run over 300 turns"

  calibration:
    # T2.8: the calibration battery as its own TIME-BOXED job — corridor
    # drift fails CI without hiding inside the main test wall-clock. The
    # ≥20-seed sweep is the NIGHTLY command (schedule below):
    #   dotnet run --project Sim.Cli -c Release -- \
    #     autoplay --seeds 20 --turns 650 --metrics nightly-metrics.json
    name: calibration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Battery (CI members — 2 canonical + 2 dev seeds, corridors.json bands)
        run: dotnet test Sim.Tests --configuration Release --filter CalibrationBatteryTests

  calibration-nightly:
    # The ≥20-seed sweep: too slow for every push, mandatory once a day.
    # Runs the same corridors via `sim autoplay` and uploads the metrics
    # JSON as an artifact for offline corridor analysis.
    name: calibration-nightly
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: 20-seed autoplay sweep
        run: |
          dotnet run --project Sim.Cli -c Release -- \
            autoplay --seeds 20 --turns 650 --metrics nightly-metrics.json
      - name: Corridor teeth across all 20 seeds (bands from corridors.json)
        # The sweep FAILS when any seed leaves a band it emits (density,
        # migration, liveness) — the nightly is a gate, not just an artifact.
        # Series-derived corridors (growth, CBR/CDR, pyramid) are enforced by
        # the in-process battery; the bands here are the ones the CLI derives.
        run: |
          jq -e --slurpfile cor Sim.Data/content/corridors.json '
            ($cor[0].canonical.densityPerArableKm2.band) as $d |
            ($cor[0].canonical.migrationGrossPerDecade.band) as $m |
            [ .seeds[] |
              (.finalPopulation > 0) and
              (.derived.densityPerArableKm2 >= $d[0] and .derived.densityPerArableKm2 <= $d[1]) and
              (.derived.migrationGrossPerDecade >= $m[0] and .derived.migrationGrossPerDecade <= $m[1])
            ] | all' nightly-metrics.json \
          || { echo "NIGHTLY CORRIDOR BREACH — inspect nightly-metrics.json artifact"; exit 1; }
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-metrics
          path: nightly-metrics.json
