name: ui-artifact

# T1.7 (D-023 Director Visual Gate): publish a win-x64 self-contained Sim.Ui
# so the director can download the zip from the Actions run and play — no
# toolchain touched. Branch-runnable this packet; T1.10 formalizes the
# per-main-merge artifact + README "Download & Play".
on:
  workflow_dispatch:
  push:
    branches: ['t1.7-ui']

jobs:
  ui-artifact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Sim.Ui (win-x64, self-contained)
        run: >
          dotnet publish Sim.Ui/Sim.Ui.csproj -c Release -r win-x64
          --self-contained -o publish/sim-ui-win-x64

      - name: Upload artifact zip
        uses: actions/upload-artifact@v4
        with:
          name: sim-ui-win-x64
          path: publish/sim-ui-win-x64
          if-no-files-found: error
          retention-days: 30
