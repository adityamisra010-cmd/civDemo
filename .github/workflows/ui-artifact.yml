name: ui-artifact

# T1.10 (D-023, formalized): the playable Windows build.
#   - every packet branch push (t[0-9]*.*) → gate zip for Director Visual Gates
#   - every push to main      → the "latest playable" artifact per merge
#   - release: published      → the zip is ATTACHED to the GitHub Release as a
#     permanent asset (runs on GitHub's runners, so milestone releases become
#     permanently downloadable games regardless of any dev-container limits).
# Build identity: -p:BuildSha/-p:BuildDate stamp the window title + debug panel
# ("civ-sim M1 (<sha>, <date>)") — the director always knows which build he
# is holding. Artifact name carries the same sha: sim-ui-win-x64-<sha>.
on:
  workflow_dispatch:
  push:
    branches: ['main', 't[0-9]*.*']
  release:
    types: [published]

jobs:
  ui-artifact:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed only by the release-asset upload step
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Compute build identity
        id: ident
        run: |
          echo "sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Publish Sim.Ui (win-x64, self-contained, identity-stamped)
        run: >
          dotnet publish Sim.Ui/Sim.Ui.csproj -c Release -r win-x64
          --self-contained -o publish/sim-ui-win-x64
          -p:BuildSha=${{ steps.ident.outputs.sha }}
          -p:BuildDate=${{ steps.ident.outputs.date }}

      - name: Assert the publish is complete (director hardening, T1.7)
        # An empty or partial publish must never go green: the exe and every
        # native the window needs are asserted BEFORE upload, and the file
        # count is printed so the run log shows what shipped.
        run: |
          set -e
          for f in Sim.Ui.exe SDL2.dll openal.dll cimgui.dll; do
            test -f "publish/sim-ui-win-x64/$f" || { echo "MISSING: $f"; exit 1; }
          done
          echo "publish contains $(ls publish/sim-ui-win-x64 | wc -l) files, $(du -sh publish/sim-ui-win-x64 | cut -f1)"

      - name: Upload artifact zip
        uses: actions/upload-artifact@v4
        with:
          name: sim-ui-win-x64-${{ steps.ident.outputs.sha }}
          path: publish/sim-ui-win-x64
          if-no-files-found: error
          retention-days: 30

      - name: Attach zip to the GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd publish
          zip -qr "sim-ui-win-x64-${{ steps.ident.outputs.sha }}.zip" sim-ui-win-x64
          gh release upload "${{ github.event.release.tag_name }}" \
            "sim-ui-win-x64-${{ steps.ident.outputs.sha }}.zip" \
            --repo "${{ github.repository }}" --clobber
          echo "attached sim-ui-win-x64-${{ steps.ident.outputs.sha }}.zip to release ${{ github.event.release.tag_name }}"
